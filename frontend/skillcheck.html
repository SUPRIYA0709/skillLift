<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillCheck Quiz Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f5f7fb; }
    .container { margin-top: 50px; }
    .quiz-btn { margin: 5px 5px 10px 0; }
    .correct { background-color: #28a745 !important; color: white; }
    .wrong { background-color: #dc3545 !important; color: white; }
  </style>
</head>
<body>
<div class="container">
  <h2>SkillCheck Quiz Demo</h2>
  <p>Try out a sample quiz!</p>

  <h4 id="questionText"></h4>
  <div id="optionsContainer"></div>
  <button id="nextBtn" class="btn btn-success mt-2" onclick="nextQuestion()">Next</button>
  <p id="scoreText" class="mt-3 fw-bold"></p>

  <br><br>
  <a href="project2.html" class="btn btn-secondary">← Back to Project Page</a>
</div>

<script>
const quizData = [
  { question: "What is 5 + 7?", options: ["10", "12", "15", "14"], answer: "12" },
  { question: "HTML stands for?", options: ["Hyper Trainer Markup Language", "Hyper Text Markup Language", "Hyper Text Machine Language", "Hyper Tool Markup Language"], answer: "Hyper Text Markup Language" },
  { question: "Which is a JavaScript framework?", options: ["React", "Laravel", "Django", "Flask"], answer: "React" }
];

let currentQuestion = 0;
let score = 0;

window.onload = startQuiz;

function startQuiz() {
  currentQuestion = 0;
  score = 0;
  document.getElementById("scoreText").innerText = "";
  document.getElementById("nextBtn").style.display = "none";
  showQuestion();
}

function showQuestion() {
  const q = quizData[currentQuestion];
  document.getElementById("questionText").innerText = q.question;
  const optionsContainer = document.getElementById("optionsContainer");
  optionsContainer.innerHTML = "";

  q.options.forEach(option => {
    const btn = document.createElement("button");
    btn.className = "btn btn-outline-primary quiz-btn";
    btn.innerText = option;
    btn.onclick = () => selectOption(btn, option);
    optionsContainer.appendChild(btn);
  });

  document.getElementById("nextBtn").style.display = "none";
}

function selectOption(button, option) {
  const correct = quizData[currentQuestion].answer;
  if (option === correct) score++;
  
  // Color buttons
  const buttons = document.querySelectorAll(".quiz-btn");
  buttons.forEach(b => {
    b.disabled = true;
    if (b.innerText === correct) b.classList.add("correct");
    else if (b !== button) b.classList.remove("wrong");
    else if (b.innerText !== correct) b.classList.add("wrong");
  });

  document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion < quizData.length) {
    showQuestion();
  } else {
    document.getElementById("questionText").innerText = "Quiz Completed!";
    document.getElementById("optionsContainer").innerHTML = "";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("scoreText").innerText = "Your Score: " + score + " / " + quizData.length;
  }
}
</script>
</body>
</html>
