<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkillLift | Interview Booking</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f4f6fb;
  font-family:'Segoe UI', sans-serif;
}

.booking-box{
  background:#fff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

footer{
  background:#111;
  color:#aaa;
  text-align:center;
  padding:15px;
  margin-top:40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="interview.html">SkillLift</a>
  </div>
</nav>

<div class="container mt-3">
  <a href="interview.html" class="btn btn-outline-secondary">
    ← Back to Interview
  </a>
</div>

<!-- PAGE TITLE -->
<div class="container mt-5">
  <h2 class="fw-bold text-center">📅 Book Your Mock Interview</h2>
  <p class="text-center text-muted fst-italic">
    “Preparation today leads to success tomorrow.”
  </p>

  <!-- BOOKING FORM -->
  <div class="booking-box mt-4">

    <form id="bookingForm">

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" name="name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" name="email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Interview Type</label>
        <select class="form-select" name="type" required>
          <option value="">Select</option>
          <option>HR Interview</option>
          <option>Technical Interview</option>
          <option>Managerial Interview</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Preferred Date</label>
        <input type="date" class="form-control" name="date" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Preferred Time</label>
        <input type="time" class="form-control" name="time" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Skills / Domain</label>
        <input type="text" class="form-control" name="skills" placeholder="Java, Python, Web Development">
      </div>

      <button type="submit" class="btn btn-success w-100">
        Confirm Booking
      </button>

      <p id="successMsg" class="mt-4 fw-bold text-success text-center" style="display:none;">
        ✅ Your interview has been scheduled successfully!
      </p>

    </form>

  </div>
</div>

<!-- FOOTER -->
<footer>
© 2025 SkillLift | Your Interview, Your Confidence 🎓
</footer>

<!-- SCRIPT -->
<script>
document.getElementById("bookingForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = e.target;
  const data = {
    name: form.name.value,
    email: form.email.value,
    type: form.type.value,
    datetime: form.date.value + "T" + form.time.value,
    skills: form.skills.value
  };

  try {
    const res = await fetch("http://localhost:5000/book", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
      document.getElementById("successMsg").style.display = "block";
      form.reset();
    } else {
      alert(result.message || "❌ Something went wrong");
    }
  } catch (err) {
    console.error(err);
    alert("❌ Server error, try again later");
  }
});
</script>

</body>
</html>
