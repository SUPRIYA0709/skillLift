<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillLift | Resume Builder</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <style>
    body {
      background-color: #f4f6fb;
      font-family: 'Segoe UI', sans-serif;
    }

    .resume-box {
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .resume-section {
      border: 1px dashed #ccc;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .resume-section h6 {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .resume-section textarea,
    .resume-section input {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
    }

    footer {
      background: #111;
      color: #aaa;
      text-align: center;
      padding: 15px;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="dashboard.html">SkillLift</a>
  </div>
</nav>

<div class="container mt-3">
  <a href="dashboard.html" class="btn btn-outline-secondary">
    ← Back to Dashboard
  </a>
</div>

<div class="container mt-4">

  <h2 class="text-center fw-bold">📄 Resume Builder</h2>

  <div class="resume-box mt-4">

    <div class="resume-section">
      <h6>Full Name</h6>
      <input type="text" id="name" placeholder="Enter your name">
    </div>

    <div class="resume-section">
      <h6>Contact Details</h6>
      <textarea id="contact" rows="2" placeholder="Email | Phone | LinkedIn"></textarea>
    </div>

    <div class="resume-section">
      <h6>Career Objective</h6>
      <textarea id="objective" rows="3"></textarea>
    </div>

    <div class="resume-section">
      <h6>Education</h6>
      <textarea id="education" rows="3"></textarea>
    </div>

    <div class="resume-section">
      <h6>Skills</h6>
      <textarea id="skills" rows="3"></textarea>
    </div>

    <div class="resume-section">
      <h6>Projects</h6>
      <textarea id="projects" rows="4"></textarea>
    </div>

    <div class="resume-section">
      <h6>Certifications / Achievements</h6>
      <textarea id="certifications" rows="3"></textarea>
    </div>

    <button class="btn btn-primary w-100 mt-3" id="saveResumeBtn">
      Save Resume
    </button>

  </div>

</div>

<footer>
  <p>© 2025 SkillLift | Build Your Career Step by Step 🎓</p>
</footer>

<!-- SCRIPT -->
<script>
  // Check login
  const user = localStorage.getItem("userEmail");

  if (!user) {
    alert("Please login first!");
    window.location.href = "index.html";
  }

  document.getElementById("saveResumeBtn").addEventListener("click", async () => {

    const name = document.getElementById("name").value;
    const contact = document.getElementById("contact").value;
    const objective = document.getElementById("objective").value;
    const education = document.getElementById("education").value;
    const skills = document.getElementById("skills").value;
    const projects = document.getElementById("projects").value;
    const certifications = document.getElementById("certifications").value;

    try {
      const res = await fetch("http://localhost:5000/resume", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name,
          contact,
          objective,
          education,
          skills,
          projects,
          certifications,
          userEmail: user
        })
      });

      const data = await res.json();

      alert(data.message);

    } catch (error) {
      console.error(error);
      alert("Error saving resume!");
    }
  });
</script>

</body>
</html>
