<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillLift | Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f7fb;
    }

    .hero {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 60px;
      text-align: center;
    }

    /* FLEX GRID FIX */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 40px;
    }

    .card-box {
      width: 30%; /* EXACT 3 per row */
      min-width: 250px;
    }

    .card {
      border-radius: 16px;
      border: none;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      height: 180px;
      object-fit: cover;
      border-radius: 16px 16px 0 0;
    }

    footer {
      background: #111;
      color: #aaa;
      padding: 15px;
      text-align: center;
      margin-top: 40px;
    }
  </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">SkillLift</span>
    <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
  </div>
</nav>

<div class="hero">
  <h2>Dashboard</h2>
  <p id="welcomeUser"></p>
</div>

<!-- FLEX GRID -->

<div class="container">
  <div class="grid">

<div class="card-box">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1586281380349-632531db7ed4">
    <div class="card-body">
      <h5>Resume Builder</h5>
      <a href="resume.html" class="btn btn-primary w-100">Build Resume</a>
    </div>
  </div>
</div>

<div class="card-box">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
    <div class="card-body">
      <h5>Portfolio</h5>
      <a href="portfolio.html" class="btn btn-success w-100">View Portfolio</a>
    </div>
  </div>
</div>

<div class="card-box">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf">
    <div class="card-body">
      <h5>Jobs</h5>
      <a href="apply.html" class="btn btn-warning w-100">Find Jobs</a>
    </div>
  </div>
</div>

<div class="card-box">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1551434678-e076c223a692">
    <div class="card-body">
      <h5>Progress Tracker</h5>
      <a href="tracker.html" class="btn btn-info w-100">View Tracker</a>
    </div>
  </div>
</div>

<div class="card-box">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
    <div class="card-body">
      <h5>Interview Prep</h5>
      <a href="preparation.html" class="btn btn-danger w-100">Prepare</a>
    </div>
  </div>
</div>

<div class="card-box">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1600880292089-90a7e086ee0c">
    <div class="card-body">
      <h5>Mock Interviews</h5>
      <a href="mock.html" class="btn btn-dark w-100">Book Now</a>
    </div>
  </div>
</div>

  </div>
</div>

<footer>
  <p>© 2025 SkillLift</p>
</footer>

<script>
const user = localStorage.getItem("userEmail");

if (!user) {
  alert("Please login first!");
  window.location.href = "index.html";
}

document.getElementById("welcomeUser").innerText = "Welcome " + user;

function logout() {
  localStorage.removeItem("userEmail");
  window.location.href = "index.html";
}
</script>

</body>
</html>
