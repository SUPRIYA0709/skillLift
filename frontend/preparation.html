<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skill Tracker - Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(to right, #6a11cb, #2575fc); 
      padding: 40px; 
      color: #333;
    }
    .section-title { 
      text-align: center; 
      margin-bottom: 30px; 
      font-weight: bold; 
      color: #fff;
    }
    .card { 
      margin-bottom: 20px; 
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      border-radius: 15px;
      transition: transform 0.2s;
    }
    .card:hover { transform: scale(1.02); }
    #timer {
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
    }
    #result {
      padding: 20px;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .btn-custom {
      background-color: #ff6a00;
      color: #fff;
      border: none;
    }
    .btn-custom:hover {
      background-color: #ff8c42;
    }
  </style>
</head>
<body>
    <div class="container mt-3">
  <a href="dashboard.html" class="btn btn-outline-secondary">
    ← Back to Dashboard
  </a>
</div>

  <div class="container">
    <h2 class="section-title">Skill Tracker - Test Your Knowledge</h2>
    <div id="timer">Time: 00:00</div>
    <div id="quiz"></div>
    <div class="text-center mt-3">
      <button id="submitQuiz" class="btn btn-custom btn-lg">Submit Test</button>
    </div>
    <div id="result" class="mt-4 text-center"></div>
  </div>

  <script>
    const quizData = [
      { question: "Which language is used for web development?", options: ["Python", "HTML", "C++", "Java"], answer: "HTML" },
      { question: "Which framework is used with Python for web apps?", options: ["Django", "React", "Angular", "Bootstrap"], answer: "Django" },
      { question: "Which tool is mainly for UI design?", options: ["Photoshop", "VS Code", "Excel", "Postman"], answer: "Photoshop" }
    ];

    const quizContainer = document.getElementById('quiz');

    // Display questions
    quizData.forEach((q, index) => {
      const card = document.createElement('div');
      card.classList.add('card', 'p-3', 'bg-light');
      card.innerHTML = `<h5>${index + 1}. ${q.question}</h5>`;
      q.options.forEach(opt => {
        card.innerHTML += `
          <div class="form-check">
            <input class="form-check-input" type="radio" name="q${index}" value="${opt}" id="q${index}${opt}">
            <label class="form-check-label" for="q${index}${opt}">${opt}</label>
          </div>`;
      });
      quizContainer.appendChild(card);
    });

    // Timer
    let startTime = Date.now();
    let timerInterval = setInterval(() => {
      const now = Date.now();
      const diff = Math.floor((now - startTime) / 1000);
      const minutes = String(Math.floor(diff / 60)).padStart(2, '0');
      const seconds = String(diff % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `Time: ${minutes}:${seconds}`;
    }, 1000);

    // Submit quiz
    document.getElementById('submitQuiz').addEventListener('click', () => {
      clearInterval(timerInterval); // stop timer
      let score = 0;
      quizData.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if(selected && selected.value === q.answer) score++;
      });

      const total = quizData.length;
      const accuracy = ((score / total) * 100).toFixed(2);
      const timeTaken = document.getElementById('timer').textContent.replace('Time: ', '');
      let performance = '';
      if(score === total) performance = 'Excellent!';
      else if(score >= total/2) performance = 'Good! Keep Practicing.';
      else performance = 'Needs Improvement. Study more.';

      document.getElementById('result').innerHTML = `
        <h4>Your Score: ${score} / ${total}</h4>
        <p>Accuracy: ${accuracy}%</p>
        <p>Time Taken: ${timeTaken}</p>
        <p>${performance}</p>`;
    });
  </script>
</body>
</html>
